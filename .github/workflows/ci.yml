name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: |
          npm ci
          npm install --include=optional --no-audit --no-fund
          npm install --no-save --no-audit --no-fund @napi-rs/canvas-linux-x64-gnu@0.1.100

      - name: Lint And Test
        run: npm run check
